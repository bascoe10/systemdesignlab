name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: |
            go.sum
            systems/url-shortener/shared/services/go.sum

      - name: Test services
        working-directory: systems/url-shortener/shared/services
        run: |
          go vet ./...
          go test -race ./internal/...
          go vet -tags integration ./integration/

      - name: Build CLI
        run: |
          go vet ./cli
          go build -o /tmp/sdl ./cli

      - name: Materialize every level and validate compose config
        run: |
          for level in 1 2 3 4 5; do
            /tmp/sdl materialize url-shortener $level /tmp/lab-$level
            COMPOSE_PROFILES=redis docker compose -f /tmp/lab-$level/docker-compose.yml config -q
            COMPOSE_PROFILES=memcached docker compose -f /tmp/lab-$level/docker-compose.yml config -q
          done

      - name: Stub levels must compile (workspace = what learners get)
        run: |
          for level in 3 5; do
            (cd /tmp/lab-$level/services && go build ./...)
          done

      - name: Level 4 hides solutions, Level 3 stubs fail their tests
        run: |
          test -f /tmp/lab-4/.solutions/SOLUTIONS.md
          if (cd /tmp/lab-3/services && go test ./internal/ring/ > /dev/null 2>&1); then
            echo "Level 3 ring tests passed on the stub — the challenge is broken"
            exit 1
          fi

      - name: Dashboards are in sync with the generator script
        working-directory: infrastructure/observability/grafana
        run: |
          python3 gen_dashboards.py
          git diff --exit-code dashboards/
