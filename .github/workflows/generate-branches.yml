name: Generate level branches

# Every push to main regenerates the level-N-*/<system> branches.
# One-directional: main → generated branches, never the reverse.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: generate-branches
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and force-push all level branches
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          bash generator/generate.sh --push
