# Transparent scoring for the diagnostic quiz.
#
# Each correct answer increments the score for its question's maps_to_level
# bucket. Recommended level = the LOWEST level where the user has NOT
# demonstrated competence (bucket score below threshold) — gaps get filled
# before strengths get exercised. A user who aces level-3 and level-5
# questions but misses the level-2 question is recommended Level 2.
#
# Level 1 is always a valid starting point regardless of score; users who
# pass every bucket are recommended Level 5.
scoring:
  level_buckets:
    level-2: { questions_tagged: 1, threshold: 1 }
    level-3: { questions_tagged: 2, threshold: 1 }
    level-4: { questions_tagged: 1, threshold: 1 }
    level-5: { questions_tagged: 1, threshold: 1 }
  default_recommendation: level-1
