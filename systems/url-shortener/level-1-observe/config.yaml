# Lab configuration — healthy defaults. On Level 1 you observe; on Level 2
# this file becomes your experiment surface.
cache:
  provider: redis          # redis | memcached
  nodes: [cache-1, cache-2, cache-3]
  ttl: 24h
  max_memory: 256mb
  eviction_policy: allkeys-lru

hashing:
  virtual_nodes: 128       # replicas of each node on the hash ring

database:
  provider: postgres
  host: db
  port: 5432
  name: shortener
  user: lab
  password: lab
  pool_size: 10

gateway:
  rate_limit_rps: 10000    # per client IP
  burst: 5000

services:
  shortener_url: http://shortener:8081
  redirector_url: http://redirector:8082
