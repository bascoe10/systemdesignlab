openapi: "3.0.3"
info:
  title: URL Shortener — Public API (api-gateway)
  version: "1.0"
  description: >
    The single public entrypoint. Proxies writes to the shortener and reads
    to the redirector, enforcing a per-client-IP rate limit (429 on excess).
paths:
  /api/shorten:
    post:
      summary: Create a short URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  description: Absolute http(s) URL to shorten.
      responses:
        "201":
          description: Short URL created
          content:
            application/json:
              schema:
                type: object
                required: [code, short_url]
                properties:
                  code: { type: string, example: "a1B2c3d" }
                  short_url: { type: string, example: "http://localhost:8080/r/a1B2c3d" }
        "400": { description: Body is not JSON or url is not absolute http(s) }
        "429": { description: Rate limit exceeded }
  /r/{code}:
    get:
      summary: Redirect to the target URL
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Redirect to the original URL
          headers:
            Location:
              schema: { type: string, format: uri }
        "404": { description: Unknown short code }
        "429": { description: Rate limit exceeded }
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200": { description: OK }
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200": { description: Prometheus exposition format }
