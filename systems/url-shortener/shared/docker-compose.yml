# URL Shortener lab stack. This file is generated to system/docker-compose.yml
# on every level branch; paths are relative to the system/ directory.
#
# The cache provider is selected by COMPOSE_PROFILES (redis | memcached),
# which the Makefile derives from cache.provider in config.yaml. Both
# providers expose the same network aliases cache-1..cache-3, so services
# never care which one is running.
name: sdl-url-shortener

services:
  api-gateway:
    build:
      context: ./services
      args: { SERVICE: api-gateway }
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ../config.yaml:/app/config.yaml:ro
    depends_on:
      db: { condition: service_healthy }
      shortener: { condition: service_started }
      redirector: { condition: service_started }
    restart: unless-stopped

  shortener:
    build:
      context: ./services
      args: { SERVICE: shortener }
    volumes:
      - ../config.yaml:/app/config.yaml:ro
    depends_on:
      db: { condition: service_healthy }
    restart: unless-stopped

  redirector:
    build:
      context: ./services
      args: { SERVICE: redirector }
    volumes:
      - ../config.yaml:/app/config.yaml:ro
    depends_on:
      db: { condition: service_healthy }
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: shortener
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d shortener"]
      interval: 2s
      timeout: 2s
      retries: 30

  # --- Cache cluster: redis profile (default) -----------------------------
  redis-1:
    image: redis:7-alpine
    profiles: ["redis"]
    networks:
      default: { aliases: [cache-1] }
  redis-2:
    image: redis:7-alpine
    profiles: ["redis"]
    networks:
      default: { aliases: [cache-2] }
  redis-3:
    image: redis:7-alpine
    profiles: ["redis"]
    networks:
      default: { aliases: [cache-3] }

  # --- Cache cluster: memcached profile ------------------------------------
  memcached-1:
    image: memcached:1.6-alpine
    command: ["-m", "256"]
    profiles: ["memcached"]
    networks:
      default: { aliases: [cache-1] }
  memcached-2:
    image: memcached:1.6-alpine
    command: ["-m", "256"]
    profiles: ["memcached"]
    networks:
      default: { aliases: [cache-2] }
  memcached-3:
    image: memcached:1.6-alpine
    command: ["-m", "256"]
    profiles: ["memcached"]
    networks:
      default: { aliases: [cache-3] }

  # --- Observability (identical on every level branch) ---------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/golden-signals.json
    volumes:
      - ../infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infrastructure/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # --- Load generator (run on demand: make load-test) -----------------------
  k6:
    image: grafana/k6:0.52.0
    profiles: ["tools"]
    environment:
      BASE_URL: http://api-gateway:8080
    volumes:
      - ./load-tests:/scripts:ro

volumes:
  pgdata:
